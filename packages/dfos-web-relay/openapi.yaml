openapi: 3.1.0
info:
  title: DFOS Web Relay
  version: 0.15.0
  description: |
    HTTP relay for the DFOS protocol. Receives, verifies, stores, and serves
    identity chains, content chains, countersignatures, and content blobs.

    Two data planes:
    - **Proof plane** (public): signed chain operations, countersignatures
    - **Content plane** (authenticated): raw content blobs gated by DID auth tokens and DFOS credentials

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /.well-known/dfos-relay:
    get:
      operationId: getRelayMetadata
      summary: Relay metadata
      description: Returns the relay's DID, protocol identifier, and version.
      tags: [Meta]
      responses:
        '200':
          description: Relay metadata
          content:
            application/json:
              schema:
                type: object
                required: [did, protocol, version, capabilities, profile, stats]
                properties:
                  did:
                    type: string
                    description: The relay's DID
                    example: 'did:dfos:cnnnft9f8a2rn938d6nkz38r847v2kr'
                  protocol:
                    type: string
                    enum: [dfos-web-relay]
                  version:
                    type: string
                    example: '0.15.0'
                  capabilities:
                    type: object
                    required: [proof, write, content, log]
                    properties:
                      proof:
                        type: boolean
                        description: Always true — a relay without proof plane is not a relay
                      write:
                        type: boolean
                        description: Whether the relay accepts writes via POST /proof/v1/operations (false = lite pull-only node)
                      content:
                        type: boolean
                        description: Whether the relay supports content plane (blob upload/download and the documents endpoint, which rides this same flag — there is no separate one)
                      log:
                        type: boolean
                        description: Whether the global operation log is available (GET /proof/v1/log)
                      revocations:
                        type: boolean
                        description: Whether the revocation status index is served (GET /revocations/v1/*)
                  profile:
                    type: string
                    description: The relay's profile artifact as a compact JWS token
                  stats:
                    type: object
                    required: [pendingOps]
                    properties:
                      pendingOps:
                        type: integer
                        description: Count of operations pending processing (-1 if unavailable)

  /proof/v1/operations:
    post:
      operationId: ingestOperations
      summary: Submit operations for ingestion
      description: |
        Accept a batch of JWS tokens — identity operations, content operations,
        and countersignatures. The relay classifies, dependency-sorts,
        verifies, and stores each token.
      tags: [Proof Plane]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operations]
              properties:
                operations:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                    description: JWS compact serialization token
      responses:
        '200':
          description: Ingestion results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngestionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '501':
          description: Writes disabled — relay is a lite pull-only node (capabilities.write is false)

  /proof/v1/operations/{cid}:
    get:
      operationId: getOperation
      summary: Get an operation by CID
      tags: [Proof Plane]
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: CIDv1 of the operation
      responses:
        '200':
          description: Operation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredOperation'
        '404':
          $ref: '#/components/responses/NotFound'

  /proof/v1/operations/{cid}/countersignatures:
    get:
      operationId: getCountersignatures
      summary: Get countersignatures for an operation
      tags: [Proof Plane]
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Countersignatures
          content:
            application/json:
              schema:
                type: object
                required: [operationCID, countersignatures]
                properties:
                  operationCID:
                    type: string
                  countersignatures:
                    type: array
                    items:
                      type: string
                      description: JWS compact serialization (witness signature)
        '404':
          $ref: '#/components/responses/NotFound'

  /proof/v1/identities/{did}:
    get:
      operationId: getIdentityChain
      summary: Get an identity chain by DID
      tags: [Proof Plane]
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
          description: 'DID of the identity (e.g., did:dfos:cnnnft9f8a2rn938d6nkz38r847v2kr)'
      responses:
        '200':
          description: Identity chain state and log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityChainResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /1.0/identifiers/{did}:
    get:
      operationId: resolveDID
      summary: Resolve a did:dfos to a W3C DID Document
      description: |
        Resolve a `did:dfos` identifier into a W3C DID Document, following the
        DIF Universal Resolver HTTP binding. Read-only and self-certifying: the
        relay serves the DID-core projection of the identity chain's verified
        terminal state. A deactivated identity resolves to 200 with an empty
        verification-method set and `deactivated: true`. Additive — rides the
        frozen v1 surface, does not touch the wire or the proof plane.
      tags: [DID Resolution]
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
          description: 'DID to resolve (e.g., did:dfos:cnnnft9f8a2rn938d6nkz38r847v2kr)'
      responses:
        '200':
          description: DIF resolution result
          content:
            application/did+ld+json:
              schema:
                type: object
                required: ['@context', didDocument, didResolutionMetadata, didDocumentMetadata]
                properties:
                  '@context':
                    type: string
                    example: https://w3id.org/did-resolution/v1
                  didDocument:
                    type: object
                    required: ['@context', id, controller, verificationMethod]
                    properties:
                      '@context':
                        type: array
                        items:
                          type: string
                      id:
                        type: string
                      controller:
                        type: string
                      verificationMethod:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                              example: Multikey
                            controller:
                              type: string
                            publicKeyMultibase:
                              type: string
                      authentication:
                        type: array
                        items:
                          type: string
                      assertionMethod:
                        type: array
                        items:
                          type: string
                      capabilityInvocation:
                        type: array
                        items:
                          type: string
                      service:
                        type: array
                        items:
                          type: object
                          required: [id, type]
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                            serviceEndpoint: {}
                            label:
                              type: string
                              description: >-
                                Human-readable label, emitted for ContentAnchor
                                service entries. Unrecognized service types are
                                preserved verbatim, so additional properties may
                                appear.
                  didResolutionMetadata:
                    type: object
                    properties:
                      contentType:
                        type: string
                        example: application/did+ld+json
                  didDocumentMetadata:
                    type: object
                    properties:
                      created:
                        type: string
                      updated:
                        type: string
                      deactivated:
                        type: boolean
                      operationCount:
                        type: integer
        '400':
          description: Malformed did:dfos identifier
          content:
            application/json:
              schema:
                type: object
                properties:
                  didDocument:
                    nullable: true
                  didResolutionMetadata:
                    type: object
                    properties:
                      error:
                        type: string
                        example: invalidDid
                  didDocumentMetadata:
                    type: object
        '404':
          description: No identity chain found for the DID
          content:
            application/json:
              schema:
                type: object
                properties:
                  didDocument:
                    nullable: true
                  didResolutionMetadata:
                    type: object
                    properties:
                      error:
                        type: string
                        example: notFound
                  didDocumentMetadata:
                    type: object

  /revocations/v1/credential/{credentialCID}:
    get:
      operationId: getCredentialRevocationStatus
      summary: Revocation status for a credential
      description: |
        Read-only projection of the relay's revocation set — the same
        (issuerDID, credentialCID) index credential enforcement consults. On its
        own 0.x clock at the relay root; revocations still enter through
        POST /proof/v1/operations. Every positive answer carries the full
        revocation JWS so a zero-trust caller re-verifies the proof instead of
        trusting the boolean. `revoked: false` is an honest known-nothing answer
        — absence is NOT proof of non-revocation. Relays without the index
        (capabilities.revocations: false) return 501.
      tags: [Revocation Status]
      parameters:
        - name: credentialCID
          in: path
          required: true
          schema:
            type: string
          description: 'Credential CID (CIDv1 dag-cbor + sha256, bafyrei…)'
      responses:
        '200':
          description: Revocation status (revoked or honest known-nothing)
          content:
            application/json:
              schema:
                type: object
                required: [credentialCID, revoked]
                properties:
                  credentialCID:
                    type: string
                  revoked:
                    type: boolean
                  revocation:
                    type: string
                    description: The full revocation JWS token — present iff revoked. Self-proving.
        '400':
          description: Malformed credential CID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid credential CID
        '501':
          description: Revocation status index not supported by this relay

  /revocations/v1/issuer/{did}:
    get:
      operationId: getIssuerRevocations
      summary: All revocations ingested for an issuer
      description: |
        Every revocation this relay has ingested for the issuer, sorted by
        credentialCID ascending. Each entry carries the full revocation JWS
        (self-proving). An issuer with none returns an empty array — same honest
        absence semantics as the credential route.
      tags: [Revocation Status]
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
          description: 'Issuer DID (canonical 31-char did:dfos)'
      responses:
        '200':
          description: Issuer revocation list (possibly empty)
          content:
            application/json:
              schema:
                type: object
                required: [did, revocations]
                properties:
                  did:
                    type: string
                  revocations:
                    type: array
                    items:
                      type: object
                      required: [credentialCID, revocation]
                      properties:
                        credentialCID:
                          type: string
                        revocation:
                          type: string
                          description: The full revocation JWS token — self-proving
        '400':
          description: Malformed did:dfos identifier
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid DID
        '501':
          description: Revocation status index not supported by this relay

  /proof/v1/content/{contentId}:
    get:
      operationId: getContentChain
      summary: Get a content chain by content ID
      tags: [Proof Plane]
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
          description: Content identifier (31-char hash)
      responses:
        '200':
          description: Content chain state and log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentChainResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/blob/{operationCID}:
    put:
      operationId: uploadBlob
      summary: Upload a content blob
      description: |
        Upload raw bytes for a document referenced by a content chain operation.
        Requires auth token. Caller must be the chain creator or the signer of the
        referenced operation.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: operationCID
          in: path
          required: true
          schema:
            type: string
          description: CID of the content operation whose documentCID this blob satisfies
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Blob stored
          content:
            application/json:
              schema:
                type: object
                required: [status, contentId, documentCID]
                properties:
                  status:
                    type: string
                    enum: [stored]
                  contentId:
                    type: string
                  documentCID:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/blob:
    get:
      operationId: downloadBlob
      summary: Download a content blob at head
      description: |
        Download the raw bytes of the current document at chain head.
        Requires auth token. Non-creators must present a DFOS read credential.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: X-Credential
          in: header
          required: false
          schema:
            type: string
          description: DFOS read credential JWS (required for non-creators)
      responses:
        '200':
          description: Blob data
          headers:
            X-Document-CID:
              schema:
                type: string
              description: The documentCID of the returned blob
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/blob/{ref}:
    get:
      operationId: downloadBlobAtRef
      summary: Download a content blob at a specific operation
      description: |
        Download the raw bytes of the document committed by a specific operation.
        The ref parameter is an operation CID within the chain.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: ref
          in: path
          required: true
          schema:
            type: string
          description: Operation CID within the chain
        - name: X-Credential
          in: header
          required: false
          schema:
            type: string
          description: DFOS read credential JWS (required for non-creators)
      responses:
        '200':
          description: Blob data
          headers:
            X-Document-CID:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/documents:
    get:
      operationId: getDocuments
      summary: List documents in a content chain
      description: |
        Returns all documents committed to a content chain as an ordered list,
        from genesis to head. Cursor-based pagination.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: CID cursor — start after this operation CID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: X-Credential
          in: header
          required: false
          schema:
            type: string
          description: DFOS read credential JWS (required for non-creators)
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: object
                required: [contentId, documents, nextCursor]
                properties:
                  contentId:
                    type: string
                  documents:
                    type: array
                    items:
                      type: object
                      required: [operationCID, documentCID, document, signerDID, createdAt]
                      properties:
                        operationCID:
                          type: string
                        documentCID:
                          type: string
                          nullable: true
                        document:
                          nullable: true
                        signerDID:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  nextCursor:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          description: Content plane not enabled (the documents endpoint is part of the content plane)

  /proof/v1/log:
    get:
      operationId: getLog
      summary: Paginated global log of all accepted operations
      description: |
        Returns every operation the relay has accepted — across all identity and
        content chains, plus countersignatures — in acceptance order.
        Cursor-based pagination. Used by peer relays to background-sync. Available
        only when the relay advertises the `log` capability; otherwise returns 501.
      tags: [Proof Plane]
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: CID cursor — start after this operation CID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Global log entries
          content:
            application/json:
              schema:
                type: object
                required: [entries, cursor]
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required: [cid, jwsToken, kind, chainId]
                      properties:
                        cid:
                          type: string
                        jwsToken:
                          type: string
                        kind:
                          type: string
                          enum:
                            [identity-op, content-op, artifact, countersign, revocation, credential]
                        chainId:
                          type: string
                          description: Chain identifier (DID or contentId)
                  cursor:
                    type: string
                    nullable: true
        '501':
          description: Global log capability not enabled

  /proof/v1/identities/{did}/log:
    get:
      operationId: getIdentityLog
      summary: Paginated log of identity chain operations
      description: |
        Returns operations belonging to this identity chain in chain order.
        Cursor-based pagination.
      tags: [Proof Plane]
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
          description: DID of the identity
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: CID cursor — start after this operation CID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Identity chain log entries
          content:
            application/json:
              schema:
                type: object
                required: [entries, cursor]
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required: [cid, jwsToken]
                      properties:
                        cid:
                          type: string
                        jwsToken:
                          type: string
                  cursor:
                    type: string
                    nullable: true
        '404':
          $ref: '#/components/responses/NotFound'

  /proof/v1/content/{contentId}/log:
    get:
      operationId: getContentLog
      summary: Paginated log of content chain operations
      description: |
        Returns operations belonging to this content chain in chain order.
        Cursor-based pagination.
      tags: [Proof Plane]
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
          description: Content identifier (31-char hash)
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: CID cursor — start after this operation CID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Content chain log entries
          content:
            application/json:
              schema:
                type: object
                required: [entries, cursor]
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required: [cid, jwsToken]
                      properties:
                        cid:
                          type: string
                        jwsToken:
                          type: string
                  cursor:
                    type: string
                    nullable: true
        '404':
          $ref: '#/components/responses/NotFound'

  /proof/v1/countersignatures/{cid}:
    get:
      operationId: getCountersignaturesByCID
      summary: Get countersignatures for an operation CID
      tags: [Proof Plane]
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: CIDv1 of the operation
      responses:
        '200':
          description: Countersignatures
          content:
            application/json:
              schema:
                type: object
                required: [cid, countersignatures]
                properties:
                  cid:
                    type: string
                  countersignatures:
                    type: array
                    items:
                      type: string
                      description: JWS compact serialization (witness signature)
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: DID-signed auth token JWT

  schemas:
    IngestionResult:
      type: object
      required: [cid, status]
      properties:
        cid:
          type: string
          description: CID of the operation
        status:
          type: string
          enum: [new, duplicate, rejected]
        error:
          type: string
          description: Error message if rejected
        kind:
          type: string
          enum: [identity-op, content-op, artifact, countersign, revocation, credential]
        chainId:
          type: string
          description: Chain identifier (DID or contentId)

    StoredOperation:
      type: object
      required: [cid, jwsToken, chainType, chainId]
      properties:
        cid:
          type: string
        jwsToken:
          type: string
        chainType:
          type: string
          enum: [identity, content, artifact, countersign, revocation, credential]
        chainId:
          type: string

    IdentityChainResponse:
      type: object
      required: [did, headCID, state]
      properties:
        did:
          type: string
        headCID:
          type: string
          description: CID of the current head operation
        state:
          type: object
          required: [did, isDeleted, authKeys, assertKeys, controllerKeys, services]
          properties:
            did:
              type: string
            isDeleted:
              type: boolean
            authKeys:
              type: array
              items:
                $ref: '#/components/schemas/MultikeyPublicKey'
            assertKeys:
              type: array
              items:
                $ref: '#/components/schemas/MultikeyPublicKey'
            controllerKeys:
              type: array
              items:
                $ref: '#/components/schemas/MultikeyPublicKey'
            services:
              type: array
              description: >-
                Resolved discovery vocabulary (controller-signed). Each entry has
                a common envelope {id, type}; recognized types DfosRelay and
                ContentAnchor carry type-specific fields. The namespace is open —
                unrecognized types are preserved verbatim.
              items:
                type: object
                required: [id, type]
                properties:
                  id:
                    type: string
                  type:
                    type: string
                additionalProperties: true

    ContentChainResponse:
      type: object
      required: [contentId, genesisCID, headCID, state]
      properties:
        contentId:
          type: string
        genesisCID:
          type: string
        headCID:
          type: string
        state:
          type: object
          required:
            [contentId, genesisCID, headCID, isDeleted, currentDocumentCID, length, creatorDID]
          properties:
            contentId:
              type: string
            genesisCID:
              type: string
            headCID:
              type: string
            isDeleted:
              type: boolean
            currentDocumentCID:
              type: string
              nullable: true
            length:
              type: integer
            creatorDID:
              type: string

    MultikeyPublicKey:
      type: object
      required: [id, type, publicKeyMultibase]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [Multikey]
        publicKeyMultibase:
          type: string

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
