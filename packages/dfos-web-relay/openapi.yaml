openapi: 3.1.0
info:
  title: DFOS Web Relay
  version: 0.1.0
  description: |
    HTTP relay for the DFOS protocol. Receives, verifies, stores, and serves
    identity chains, content chains, beacons, countersignatures, and content blobs.

    Two data planes:
    - **Proof plane** (public): signed chain operations, beacons, countersignatures
    - **Content plane** (authenticated): raw content blobs gated by DID auth tokens and DFOS credentials

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /.well-known/dfos-relay:
    get:
      operationId: getRelayMetadata
      summary: Relay metadata
      description: Returns the relay's DID, protocol identifier, and version.
      tags: [Meta]
      responses:
        '200':
          description: Relay metadata
          content:
            application/json:
              schema:
                type: object
                required: [did, protocol, version, capabilities, profile]
                properties:
                  did:
                    type: string
                    description: The relay's DID
                    example: 'did:dfos:e3vvtck42d4eacdnzvtrn6'
                  protocol:
                    type: string
                    enum: [dfos-web-relay]
                  version:
                    type: string
                    example: '0.8.0'
                  capabilities:
                    type: object
                    required: [proof, content, documents, log]
                    properties:
                      proof:
                        type: boolean
                        description: Always true — a relay without proof plane is not a relay
                      content:
                        type: boolean
                        description: Whether the relay supports content plane (blob upload/download)
                      documents:
                        type: boolean
                        description: Whether the relay serves the documents endpoint
                      log:
                        type: boolean
                        description: Whether the global operation log is available (GET /log)
                  profile:
                    type: string
                    description: The relay's profile artifact as a compact JWS token

  /operations:
    post:
      operationId: ingestOperations
      summary: Submit operations for ingestion
      description: |
        Accept a batch of JWS tokens — identity operations, content operations,
        beacons, and countersignatures. The relay classifies, dependency-sorts,
        verifies, and stores each token.
      tags: [Proof Plane]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [operations]
              properties:
                operations:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                    description: JWS compact serialization token
      responses:
        '200':
          description: Ingestion results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngestionResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  /operations/{cid}:
    get:
      operationId: getOperation
      summary: Get an operation by CID
      tags: [Proof Plane]
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: CIDv1 of the operation
      responses:
        '200':
          description: Operation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredOperation'
        '404':
          $ref: '#/components/responses/NotFound'

  /operations/{cid}/countersignatures:
    get:
      operationId: getCountersignatures
      summary: Get countersignatures for an operation
      tags: [Proof Plane]
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Countersignatures
          content:
            application/json:
              schema:
                type: object
                required: [operationCID, countersignatures]
                properties:
                  operationCID:
                    type: string
                  countersignatures:
                    type: array
                    items:
                      type: string
                      description: JWS compact serialization (witness signature)
        '404':
          $ref: '#/components/responses/NotFound'

  /identities/{did}:
    get:
      operationId: getIdentityChain
      summary: Get an identity chain by DID
      tags: [Proof Plane]
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
          description: 'DID of the identity (e.g., did:dfos:e3vvtck42d4eacdnzvtrn6)'
      responses:
        '200':
          description: Identity chain state and log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityChainResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}:
    get:
      operationId: getContentChain
      summary: Get a content chain by content ID
      tags: [Proof Plane]
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
          description: Content identifier (22-char hash)
      responses:
        '200':
          description: Content chain state and log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentChainResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/blob/{operationCID}:
    put:
      operationId: uploadBlob
      summary: Upload a content blob
      description: |
        Upload raw bytes for a document referenced by a content chain operation.
        Requires auth token. Caller must be the chain creator or the signer of the
        referenced operation.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: operationCID
          in: path
          required: true
          schema:
            type: string
          description: CID of the content operation whose documentCID this blob satisfies
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Blob stored
          content:
            application/json:
              schema:
                type: object
                required: [status, contentId, documentCID]
                properties:
                  status:
                    type: string
                    enum: [stored]
                  contentId:
                    type: string
                  documentCID:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/blob:
    get:
      operationId: downloadBlob
      summary: Download a content blob at head
      description: |
        Download the raw bytes of the current document at chain head.
        Requires auth token. Non-creators must present a DFOS read credential.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: X-Credential
          in: header
          required: false
          schema:
            type: string
          description: DFOS read credential JWS (required for non-creators)
      responses:
        '200':
          description: Blob data
          headers:
            X-Document-CID:
              schema:
                type: string
              description: The documentCID of the returned blob
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/blob/{ref}:
    get:
      operationId: downloadBlobAtRef
      summary: Download a content blob at a specific operation
      description: |
        Download the raw bytes of the document committed by a specific operation.
        The ref parameter is an operation CID within the chain.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: ref
          in: path
          required: true
          schema:
            type: string
          description: Operation CID within the chain
        - name: X-Credential
          in: header
          required: false
          schema:
            type: string
          description: DFOS read credential JWS (required for non-creators)
      responses:
        '200':
          description: Blob data
          headers:
            X-Document-CID:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/documents:
    get:
      operationId: getDocuments
      summary: List documents in a content chain
      description: |
        Returns all documents committed to a content chain as an ordered list,
        from genesis to head. Cursor-based pagination.
      tags: [Content Plane]
      security:
        - BearerAuth: []
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: CID cursor — start after this operation CID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: X-Credential
          in: header
          required: false
          schema:
            type: string
          description: DFOS read credential JWS (required for non-creators)
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: object
                required: [contentId, documents, nextCursor]
                properties:
                  contentId:
                    type: string
                  documents:
                    type: array
                    items:
                      type: object
                      required: [operationCID, documentCID, document, signerDID, createdAt]
                      properties:
                        operationCID:
                          type: string
                        documentCID:
                          type: string
                          nullable: true
                        document:
                          nullable: true
                        signerDID:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  nextCursor:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '501':
          description: Documents capability not enabled

  /identities/{did}/log:
    get:
      operationId: getIdentityLog
      summary: Paginated log of identity chain operations
      description: |
        Returns operations belonging to this identity chain in chain order.
        Cursor-based pagination.
      tags: [Proof Plane]
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
          description: DID of the identity
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: CID cursor — start after this operation CID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Identity chain log entries
          content:
            application/json:
              schema:
                type: object
                required: [entries, cursor]
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required: [cid, jwsToken]
                      properties:
                        cid:
                          type: string
                        jwsToken:
                          type: string
                  cursor:
                    type: string
                    nullable: true
        '404':
          $ref: '#/components/responses/NotFound'

  /content/{contentId}/log:
    get:
      operationId: getContentLog
      summary: Paginated log of content chain operations
      description: |
        Returns operations belonging to this content chain in chain order.
        Cursor-based pagination.
      tags: [Proof Plane]
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
          description: Content identifier (22-char hash)
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: CID cursor — start after this operation CID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Content chain log entries
          content:
            application/json:
              schema:
                type: object
                required: [entries, cursor]
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required: [cid, jwsToken]
                      properties:
                        cid:
                          type: string
                        jwsToken:
                          type: string
                  cursor:
                    type: string
                    nullable: true
        '404':
          $ref: '#/components/responses/NotFound'

  /countersignatures/{cid}:
    get:
      operationId: getCountersignaturesByCID
      summary: Get countersignatures for any CID (operation or beacon)
      tags: [Proof Plane]
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
          description: CIDv1 of the operation or beacon
      responses:
        '200':
          description: Countersignatures
          content:
            application/json:
              schema:
                type: object
                required: [cid, countersignatures]
                properties:
                  cid:
                    type: string
                  countersignatures:
                    type: array
                    items:
                      type: string
                      description: JWS compact serialization (witness signature)
        '404':
          $ref: '#/components/responses/NotFound'

  /beacons/{did}:
    get:
      operationId: getBeacon
      summary: Get the latest beacon for a DID
      tags: [Proof Plane]
      parameters:
        - name: did
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest beacon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BeaconResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: DID-signed auth token JWT

  schemas:
    IngestionResult:
      type: object
      required: [cid, status]
      properties:
        cid:
          type: string
          description: CID of the operation
        status:
          type: string
          enum: [new, duplicate, rejected]
        error:
          type: string
          description: Error message if rejected
        kind:
          type: string
          enum: [identity-op, content-op, beacon, artifact, countersign, revocation, credential]
        chainId:
          type: string
          description: Chain identifier (DID or contentId)

    StoredOperation:
      type: object
      required: [cid, jwsToken, chainType, chainId]
      properties:
        cid:
          type: string
        jwsToken:
          type: string
        chainType:
          type: string
          enum: [identity, content, artifact, beacon, countersign, revocation, credential]
        chainId:
          type: string

    IdentityChainResponse:
      type: object
      required: [did, headCID, state]
      properties:
        did:
          type: string
        headCID:
          type: string
          description: CID of the current head operation
        state:
          type: object
          required: [did, isDeleted, authKeys, assertKeys, controllerKeys]
          properties:
            did:
              type: string
            isDeleted:
              type: boolean
            authKeys:
              type: array
              items:
                $ref: '#/components/schemas/MultikeyPublicKey'
            assertKeys:
              type: array
              items:
                $ref: '#/components/schemas/MultikeyPublicKey'
            controllerKeys:
              type: array
              items:
                $ref: '#/components/schemas/MultikeyPublicKey'

    ContentChainResponse:
      type: object
      required: [contentId, genesisCID, log, state]
      properties:
        contentId:
          type: string
        genesisCID:
          type: string
        log:
          type: array
          items:
            type: string
        state:
          type: object
          required:
            [contentId, genesisCID, headCID, isDeleted, currentDocumentCID, length, creatorDID]
          properties:
            contentId:
              type: string
            genesisCID:
              type: string
            headCID:
              type: string
            isDeleted:
              type: boolean
            currentDocumentCID:
              type: string
              nullable: true
            length:
              type: integer
            creatorDID:
              type: string

    BeaconResponse:
      type: object
      required: [did, jwsToken, beaconCID, manifestContentId, createdAt]
      properties:
        did:
          type: string
        jwsToken:
          type: string
        beaconCID:
          type: string
        manifestContentId:
          type: string
          description: Content ID of the manifest chain
        createdAt:
          type: string
          format: date-time

    MultikeyPublicKey:
      type: object
      required: [id, type, publicKeyMultibase]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [Multikey]
        publicKeyMultibase:
          type: string

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

tags:
  - name: Meta
    description: Relay metadata and discovery
  - name: Proof Plane
    description: Public routes for signed chain operations, beacons, and countersignatures
  - name: Content Plane
    description: Authenticated routes for content blob storage and retrieval
