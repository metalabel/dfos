<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Apply the persisted theme BEFORE first paint so there's no flash of the
      // wrong ground. Dark is the default; the header toggle writes this key.
      (function () {
        try {
          var t = localStorage.getItem('dfos-explorer:theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.colorScheme = t;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%231b1b18'/%3E%3Crect x='3' y='3' width='4' height='4' fill='%23f6f6f2'/%3E%3Crect x='9' y='9' width='4' height='4' fill='%23f6f6f2'/%3E%3Cpath d='M7 5h2v1H7zM5 7v2h1V7zM10 7v2h-1V7z' fill='%239a9a90'/%3E%3C/svg%3E"
    />
    <title>dfos explorer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
