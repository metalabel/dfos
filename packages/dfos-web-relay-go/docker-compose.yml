# 3-node ring topology for testing peering behaviors.
#
# Build:  docker compose build
# Start:  docker compose up
# Test:   ./topology.sh smoke
# Clean:  docker compose down -v

services:
  relay-a:
    build:
      context: ../..
      dockerfile: packages/dfos-web-relay-go/Dockerfile
    environment:
      PORT: "8080"
      RELAY_NAME: "relay-a"
      PEERS: "http://relay-b:8080"
      SYNC_INTERVAL: "5s"
    ports:
      - "9801:8080"
    volumes:
      - data-a:/data

  relay-b:
    build:
      context: ../..
      dockerfile: packages/dfos-web-relay-go/Dockerfile
    environment:
      PORT: "8080"
      RELAY_NAME: "relay-b"
      PEERS: "http://relay-c:8080"
      SYNC_INTERVAL: "5s"
    ports:
      - "9802:8080"
    volumes:
      - data-b:/data

  relay-c:
    build:
      context: ../..
      dockerfile: packages/dfos-web-relay-go/Dockerfile
    environment:
      PORT: "8080"
      RELAY_NAME: "relay-c"
      PEERS: "http://relay-a:8080"
      SYNC_INTERVAL: "5s"
    ports:
      - "9803:8080"
    volumes:
      - data-c:/data

volumes:
  data-a:
  data-b:
  data-c:
