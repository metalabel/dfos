name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm turbo typecheck --force

      - name: Test
        run: pnpm test

  dfos-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/dfos-cli/go.mod
          cache-dependency-path: packages/dfos-cli/go.sum

      - name: Test dfos-protocol-go
        working-directory: packages/dfos-protocol-go
        run: go test ./...

      - name: Build dfos-cli
        working-directory: packages/dfos-cli
        run: go build ./cmd/dfos

      - name: Test dfos-cli
        working-directory: packages/dfos-cli
        run: go test ./...

  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/dfos-cli/go.mod
          cache-dependency-path: packages/dfos-cli/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go conformance tests against TS relay
        working-directory: packages/dfos-web-relay
        run: ./tests/run-conformance.sh

  conformance-go:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/dfos-cli/go.mod
          cache-dependency-path: packages/dfos-cli/go.sum

      - name: Run Go conformance tests against Go relay (memory)
        working-directory: packages/dfos-web-relay-go
        run: ./tests/run-conformance.sh

      - name: Run Go conformance tests against Go relay (sqlite)
        working-directory: packages/dfos-web-relay-go
        run: STORE=sqlite ./tests/run-conformance.sh

  verify-go:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: packages/dfos-protocol/verify/go/go.sum

      - name: Run Go verification
        working-directory: packages/dfos-protocol/verify/go
        run: go test -v

  verify-python:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install pynacl dag-cbor base58

      - name: Run Python verification
        run: python packages/dfos-protocol/verify/python/verify_protocol.py

  verify-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Rust verification
        working-directory: packages/dfos-protocol/verify/rust
        run: cargo test --verbose

  verify-swift:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Run Swift verification
        working-directory: packages/dfos-protocol/verify/swift
        run: swift test
