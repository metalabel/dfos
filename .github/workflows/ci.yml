name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The full correctness matrix lives in test-matrix.yml (a reusable workflow)
  # so CI and Release gate on the exact same set of jobs. Deploy gates on this
  # workflow's conclusion via workflow_run.
  test-matrix:
    uses: ./.github/workflows/test-matrix.yml
