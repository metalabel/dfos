name: Deploy

# Deploy only after CI succeeds on main. The "CI" workflow runs on push to main;
# this workflow waits for that run to complete and gates each job on its success
# (see the `if:` guards below). workflow_dispatch allows manual redeploys.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # On workflow_run, only deploy if CI passed. Manual dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Deploy the exact commit CI gated, not whatever main HEAD is now —
          # workflow_run fires asynchronously and a newer (ungated) commit may
          # have landed. Falls back to the dispatched ref for manual runs.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @metalabel/site-protocol build

      - name: Deploy to Cloudflare Pages
        # Invoke wrangler directly (via `exec`) instead of `run deploy -- --branch`.
        # The `pnpm run <script> -- <args>` form forwarded a literal `--` into
        # wrangler, which treats it as end-of-options and DROPPED `--branch`, so
        # every deploy auto-detected the detached-HEAD branch ("head") and landed
        # as a PREVIEW — the production alias (protocol.dfos.com) never updated.
        run: pnpm --filter @metalabel/site-protocol exec wrangler pages deploy dist --branch=${{ github.ref_name }} --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Cloudflare's CDN does not purge cached HTML when a new Pages deployment
      # goes live, so changed pages can serve stale until their TTL expires.
      # Purge the site's page URLs (derived from the build output) on every
      # deploy. Scoped to protocol.dfos.com pages only — never the whole zone.
      # No-ops with a warning until CLOUDFLARE_ZONE_ID + a cache-purge-scoped
      # token are set; reuses CLOUDFLARE_API_TOKEN if no dedicated purge token.
      - name: Purge Cloudflare CDN cache
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          token="${CF_PURGE_TOKEN:-$CF_API_TOKEN}"
          if [ -z "${CF_ZONE_ID}" ] || [ -z "${token}" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID (or a purge token) not set — skipping CDN cache purge"
            exit 0
          fi
          base="https://protocol.dfos.com"
          urls=$(cd packages/site-protocol/dist && find . -name '*.html' \
            | sed -e 's|^\.||' -e 's|/index\.html$|/|' -e 's|\.html$|/|' \
            | sed -e "s|^|$base|" | sort -u)
          echo "Purging $(printf '%s\n' "$urls" | grep -c .) URLs:"
          printf '  %s\n' $urls
          payload=$(printf '%s\n' "$urls" | jq -R . | jq -s '{files: .}')
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            --data "$payload" | jq -e '.success == true' >/dev/null \
            && echo "Cache purged." || { echo "::error::Cloudflare purge failed"; exit 1; }

  deploy-schemas:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # On workflow_run, only deploy if CI passed. Manual dispatch always proceeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Deploy the exact commit CI gated, not whatever main HEAD is now —
          # workflow_run fires asynchronously and a newer (ungated) commit may
          # have landed. Falls back to the dispatched ref for manual runs.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @metalabel/site-schemas build

      - name: Deploy to Cloudflare Pages
        # See the protocol job above: `run deploy -- --branch` dropped --branch and
        # deployed previews; invoke wrangler directly so production actually updates.
        run: pnpm --filter @metalabel/site-schemas exec wrangler pages deploy public --branch=${{ github.ref_name }} --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
